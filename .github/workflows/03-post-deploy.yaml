# CI de Nível 03 - Disparo após a conclusão de outra pipeline ou por Deploy/Push
name: 'N3 - Execução por Deploy'

# Regras de disparo
on:
  workflow_run:
    workflows: ['N1 - Execução Manual', 'N2 - Execução Agendada']
    types:
      - completed
  push:
    branches:
      - master

jobs:
  e2e-tests:
    name: Executar Testes E2E (Mocha)
    runs-on: ubuntu-latest

    # Executa se o gatilho for um push OU se for um workflow_run concluído com sucesso
    if: >
      github.event_name == 'push' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      # Clone do projeto
      - name: Checkout do código
        uses: actions/checkout@v4

      # Solução do Aviso 2: Atualizado diretamente para Node 24.x para evitar avisos de depreciação
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # Solução do Erro 1 (Parte B): Alterado de '--frozen-lockfile' para 'install' simples
      # Isso gera o arquivo yarn.lock automaticamente caso ele não esteja no repositório
      - name: Instalar dependências
        run: yarn install

      # Instalação dos Browsers do Playwright com dependências do sistema operacional Linux
      - name: Instalar Browsers do Playwright
        run: yarn playwright install --with-deps

      # Executar os testes e2e com Mocha
      - name: Executar testes com Mocha
        run: yarn test

      # Solução do Aviso 3: Salvando relatórios de testes (Mochawesome)
      - name: Salvar relatório Mochawesome
        uses: actions/upload-artifact@v4
        if: always() # Garante o upload mesmo se os testes falharem (ajuda no diagnóstico)
        with:
          name: relatorio-testes-mocha
          path: ./mochawesome-report/
          retention-days: 7

