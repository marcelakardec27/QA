# CI de Nível 04 - Pipeline Integrada ao Build do Código
name: 'N4 - Execução Integrada'

on:
  workflow_dispatch:
  push:
    branches:
      - master

env:
  NODE_VERSION: '24.x'

jobs:
  # Job 1: Inspeção de Qualidade (Totalmente isolado contra bloqueios)
  inspecao:
    runs-on: ubuntu-latest
    continue-on-error: true 
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalando dependências
        run: npm install

      - name: Inspeção de Código (Linter)
        run: npm run lint

  # Job 2: Testes Unitários com Mocha
  unidade:
    runs-on: ubuntu-latest
    needs: [inspecao]
    if: always() # Garante a execução mesmo se a inspeção trouxer avisos
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalando dependências
        run: npm install

      - name: Rodando testes unitários com Mocha
        run: npx mocha test/servicoPagamento.test.js --reporter mochawesome --reporter-options reportDir=mochawesome-report,overwrite=true,html=true,json=true

      - name: Salvando relatório de testes unitários
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-unitario-mocha
          path: ./mochawesome-report/
          if-no-files-found: ignore
          retention-days: 7

  # Job 3: Testes E2E com Mocha + Playwright
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [inspecao]
    if: always() # Garante a execução mesmo se a inspeção trouxer avisos
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalando dependências
        run: npm install

      - name: Instalando Browsers do Playwright
        run: npx playwright install --with-deps

      - name: Executando testes E2E com Mocha
        run: npx mocha test/servicoPagamento.test.js --reporter mochawesome --reporter-options reportDir=mochawesome-report,overwrite=true,html=true,json=true

      - name: Salvando relatório Mochawesome E2E
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-e2e-mochawesome
          path: ./mochawesome-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: HTML Preview
        id: preview
        uses: pcan/html-preview-action@v1.1.0
        if: always()
        with:
          html_file: 'mochawesome-report/mochawesome.html'

      - name: Inserir Link no Sumário do Job
        if: always()
        run: |
          echo "### 📊 Relatório de Testes E2E Disponível!" >> $GITHUB_STEP_SUMMARY
          echo "Para visualizar o relatório Mochawesome interativo sem baixar o zip, acesse os logs do passo **HTML Preview** acima." >> $GITHUB_STEP_SUMMARY

  # Job 4: Deploy
  deploy:
    runs-on: ubuntu-latest
    needs: [unidade, e2e-tests]
    if: always() # Executa para fechar o ciclo da esteira e permitir a checagem dos artefatos
    steps:
      - name: Simulação de Deploy
        run: echo 'Esteira concluída. Verifique os relatórios salvos se houver falhas.'