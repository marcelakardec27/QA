# CI de Nível 04 - Pipeline Integrada ao Build do Código
name: 'N4 - Execução Integrada'

on:
  workflow_dispatch:
  push:
    branches:
      - master

env:
  NODE_VERSION: '24.x'

jobs:
  # Job 1: Inspeção de Qualidade
  inspecao:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalando dependências
        run: npm install

      - name: Inspeção de Código (Linter)
        run: npm run lint
        continue-on-error: true # Permite que a pipeline siga mesmo com alertas de estilo

  # Job 2: Testes Unitários com Mocha
  unidade:
    runs-on: ubuntu-latest
    needs: [inspecao]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalando dependências
        run: npm install

      - name: Rodando testes unitários com Mocha
        run: npx mocha test/servicoPagamento.unit.test.js --reporter mochawesome --reporter-options reportDir=mochawesome-report,overwrite=true,html=true,json=true
        continue-on-error: true # Garante a geração do relatório mesmo se algum teste falhar

      - name: Salvando relatório de testes unitários
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-unitario-mocha
          path: ./mochawesome-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Inserir Sumário de Execução do Job
        if: always()
        run: |
          echo "### 📊 Relatório de Testes Unitários Disponível!" >> $GITHUB_STEP_SUMMARY
          echo "Os testes unitários foram concluídos e o relatório do Mochawesome foi gerado." >> $GITHUB_STEP_SUMMARY
          echo "Baixe o arquivo **relatorio-unitario-mocha** na seção de artefatos (Artifacts) no topo para analisar os resultados." >> $GITHUB_STEP_SUMMARY

  # Job 3: Deploy (Executa logo após a conclusão dos testes unitários)
  deploy:
    runs-on: ubuntu-latest
    needs: [unidade]
    if: always()
    steps:
      - name: Simulação de Deploy
        run: echo 'Esteira concluída com sucesso.'