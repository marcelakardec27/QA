# CI de Nível 04 - Pipeline Integrada ao Build do Código
name: 'N4 - Execução Integrada'

# Gatilhos / Triggers
on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  # Job 1: Inspeção de Qualidade
  inspecao:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Atualizado para Node 24 para eliminar avisos de depreciação
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # Removido o --frozen-lockfile temporariamente para criar o lockfile caso ele não exista
      - name: Instalando dependências
        run: yarn install

      - name: Inspeção de Código (Linter)
        run: yarn lint

  # Job 2: Testes Unitários com Mocha
  unidade:
    runs-on: ubuntu-latest
    needs: [inspecao]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Instalando dependências
        run: yarn install

      - name: Rodando testes unitários com Mocha
        run: yarn test:unit

      # Ajustado o path para a pasta padrão do Mochawesome
      - name: Salvando relatório de testes unitários
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-unitario-mocha
          path: ./mochawesome-report/
          retention-days: 7

  # Job 3: Testes E2E com Mocha + Playwright
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [inspecao]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Instalando dependências
        run: yarn install

      - name: Instalando Browsers do Playwright
        run: yarn playwright install --with-deps

      - name: Executando testes E2E com Mocha
        run: yarn e2e

      # Corrigido o path para a pasta padrão gerada pelo Mocha (./mochawesome-report)
      - name: Salvando relatório Mochawesome E2E
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-e2e-mochawesome
          path: ./mochawesome-report/
          retention-days: 7

  # Job 4: Deploy (Apenas se unidade E e2e passarem)
  deploy:
    runs-on: ubuntu-latest
    needs: [unidade, e2e-tests]
    steps:
      - name: Simulação de Deploy
        run: echo 'Todos os testes com Mocha passaram! Deploy realizado com sucesso.'