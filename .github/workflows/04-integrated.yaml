# CI de Nível 04 - Pipeline Integrada ao Build do Código
name: 'N4 - Execução Integrada'

on:
  workflow_dispatch:
  push:
    branches:
      - master

env:
  NODE_VERSION: '24.x'

jobs:
  # Job 1: Inspeção de Qualidade (Linter)
  inspecao:
    runs-on: ubuntu-latest
    steps:
      - name: Clone do projeto
        uses: actions/checkout@v4

      - name: Configuração do Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalando Yarn globalmente
        run: npm install -g yarn

      - name: Instalando dependências com Yarn
        run: yarn install

      - name: Inspeção de Código (Linter)
        run: yarn run lint
        continue-on-error: true

  # Job 2: Testes Unitários com Mocha
  unidade:
    runs-on: ubuntu-latest
    needs: [inspecao]
    if: always()
    steps:
      - name: Clone do projeto
        uses: actions/checkout@v4

      - name: Configuração do Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalando Yarn globalmente
        run: npm install -g yarn

      - name: Instalando dependências com Yarn
        run: yarn install

      - name: Rodando testes unitários com Mocha
        run: yarn run test:unit

      - name: Salvando relatório de testes unitários
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-unitario-mocha
          path: ./mochawesome-report/
          if-no-files-found: ignore
          retention-days: 7

  # Job 3: Testes E2E (Playwright + Mocha)
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [inspecao]
    if: always()
    steps:
      - name: Clone do projeto
        uses: actions/checkout@v4

      - name: Configuração do Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalando Yarn globalmente
        run: npm install -g yarn

      - name: Instalando dependências com Yarn
        run: yarn install

      - name: Instalando Browsers do Playwright
        run: yarn playwright install

      - name: Executando testes E2E
        run: yarn run e2e

      - name: Salvando relatórios de testes E2E
        uses: actions/upload-artifact@v4
        if: always()
        with:
          path: ./mochawesome-report/
          name: Relatório de Testes E2E

  # Job 4: Deploy
  deploy:
    runs-on: ubuntu-latest
    needs: [unidade, e2e-tests]
    if: always()
    steps:
      - name: Simulação de Deploy
        run: echo 'Deploy sendo realizado... Código validado com Mocha!'