# CI de Nível 01 - Disparo Manual através de clique e Push na Master
name: 'N1 - Execução Manual'

# gatilhos / triggers - regras de disparo
on:
  workflow_dispatch:
  push:
    branches:
      - master

# tarefas dentro da pipeline = jobs
jobs:
  mocha-tests:
    # máquina onde o job vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      # clone do projeto para dentro da máquina virtual
      - name: Checkout do código
        uses: actions/checkout@v4

      # instalação do Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
        node-version: 24.x # Versão LTS estável compatível com o seu ambiente
      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      #   instalação das dependências
      - name: Instalando dependências
        run: yarn

      # executar os testes e2e
      - name: Executando testes e2e
        run: yarn run e2e

      - name: Salvando relatórios de testes
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          path: ./playwright-report
          name: Relatório de Testes E2E